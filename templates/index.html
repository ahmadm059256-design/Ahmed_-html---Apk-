<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dajment Pro | NovaTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --bg: #0f172a; --c: #1e293b; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--c); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { text-align: center; background: linear-gradient(to left, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--p), var(--s)); color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .note { font-size: 11px; color: #64748b; margin-top: 15px; border-right: 3px solid var(--p); padding-right: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dajment Pro 🚀</h1>
        <form action="/convert" method="POST" enctype="multipart/form-data">
            <div class="field">
                <label>اسم التطبيق:</label>
                <input type="text" name="app_name" placeholder="مثلاً: مشروعي الذكي" required>
            </div>
            <div class="field">
                <label>ملف المشروع (ZIP):</label>
                <input type="file" name="project_zip" accept=".zip" required>
            </div>
            <div class="field">
                <label>أيقونة التطبيق (PNG):</label>
                <input type="file" name="app_icon" accept="image/png">
            </div>
            <div class="field">
                <label>الوضع الافتراضي:</label>
                <select name="orientation">
                    <option value="portrait">عمودي (Portrait)</option>
                    <option value="landscape">أفقي (Landscape)</option>
                </select>
            </div>
            <div class="field">
                <label>نوع التطبيق:</label>
                <select name="app_mode">
                    <option value="offline">يعمل بدون إنترنت (Offline)</option>
                    <option value="online">متصل بالإنترنت (Online)</option>
                </select>
            </div>
            <button type="submit" class="btn">بدء التحويل الآن</button>
        </form>
        <div class="note">
            بواسطة NovaTech - جميع الحقوق محفوظة 2026.
        </div>
    </div>
</body>

            </select>
        </div>

        <div class="form-group">
            <label>وضع الاتصال:</label>
            <select name="app_mode">
                <option value="online">متصل بالإنترنت (Online)</option>
                <option value="offline">يعمل بدون إنترنت (Offline)</option>
            </select>
        </div>

        <div class="form-group">
            <label>أيقونة التطبيق (Logo):</label>
            <input type="file" name="app_icon" accept="image/*">
        </div>

        <button type="submit" class="btn">تحويل إلى APK الآن</button>
    </form>

    <div class="features-note">
        ✨ ميزات مدمجة تلقائياً:<br>
        • شاشة ترحيب (Splash Screen) باسم "أحمد".<br>
        • نظام تشفير NovaTech لحماية الأكواد.<br>
        • ضغط الملفات لتقليل حجم التطبيق.
    </div>

    <div class="footer-text">
        جميع الحقوق محفوظة لشركة NovaTech © 2026
    </div>
</div>

</body>
</html>
