<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dajment Pro | NovaTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .tagline {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input[type="text"], 
        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #1e293b;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        /* تنسيق خيارات الراديو (Online/Offline) */
        .mode-selector {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .radio-option input {
            margin-left: 8px;
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 6px;
            display: block;
        }

        button {
            width: 100%;
            background: linear-gradient(45deg, var(--primary), #a855f7);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .footer b {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="logo">Dajment Pro</h1>
        <p class="tagline">منصة NovaTech لتحويل الويب إلى تطبيقات 🚀</p>
    </header>

    <form action="/convert" method="post" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>اسم التطبيق:</label>
            <input type="text" name="app_name" placeholder="مثلاً: تطبيق ألعابي" required>
        </div>

        <div class="form-group">
            <label>ملف المشروع (ZIP):</label>
            <input type="file" name="project_zip" accept=".zip" required>
            <span class="help-text">* يجب أن يحتوي الملف على index.html في المجلد الرئيسي.</span>
        </div>

        <div class="form-group">
            <label>أيقونة التطبيق (صورة):</label>
            <input type="file" name="app_icon" accept="image/*">
            <span class="help-text">* سيتم تحويل الصورة تلقائياً لأيقونة أندرويد.</span>
        </div>
<select name="orientation">
        <div class="form-group">
            <label>نوع التطبيق (الاتصال):</label>
            <div class="mode-selector">
                <label class="radio-option">
                    <input type="radio" name="app_mode" value="online" checked> متصل (Online)
                </label>
                <label class="radio-option">
                    <input type="radio" name="app_mode" value="offline"> بدون إنترنت (Offline)
                </label>
            </div>
            <span class="help-text">* وضع الأوفلاين يزيل أذونات الإنترنت لزيادة الأمان.</span>
        </div>

        <button type="submit">بدء البناء وتوليد APK</button>
    </form>
    
    <div class="footer">
        طُور بكل فخر بواسطة المبرمج <b>أحمد عيد</b><br>
        جميع الحقوق محفوظة لـ <span>NovaTech 2026</span>
    </div>
</div>

</body>
          </html>
